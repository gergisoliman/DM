<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة أسعار المحل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#FAF6EF;
    --surface:#FFFFFF;
    --ink:#20231F;
    --ink-soft:#6B7468;
    --primary:#1F4D3A;
    --primary-dark:#163827;
    --primary-soft:#E4ECE6;
    --accent:#D9A441;
    --accent-soft:#F4E4BB;
    --danger:#B3503D;
    --danger-soft:#F3E1DC;
    --border:#E7E0D2;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans Arabic', system-ui, Tahoma, sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{ font-family:'Tajawal', system-ui, Tahoma, sans-serif; }
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}

  /* ---------- Setup screen ---------- */
  #setupScreen{
    max-width:560px;margin:60px auto;background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius);
    padding:28px;display:none;
  }
  #setupScreen h2{margin:0 0 8px;font-size:20px;}
  #setupScreen p{color:var(--ink-soft);font-size:14px;line-height:1.8;margin:0 0 16px;}
  #setupScreen textarea{
    width:100%;min-height:160px;border:1px solid var(--border);
    border-radius:10px;padding:12px;font-family:monospace;font-size:13px;
    direction:ltr;text-align:left;outline:none;resize:vertical;
  }
  #setupScreen textarea:focus{border-color:var(--accent);}
  #setupScreen button{
    margin-top:14px;background:var(--primary);color:#fff;border:none;
    padding:12px 22px;border-radius:9px;font-weight:700;font-size:14px;
  }
  #setupError{color:var(--danger);font-size:13px;margin-top:10px;display:none;}

  /* ---------- Header ---------- */
  header{
    background:var(--primary);
    background-image:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    padding:16px 22px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    box-shadow:0 4px 18px rgba(22,56,39,0.18);
    position:sticky;top:0;z-index:30;
  }
  .brand{display:flex;align-items:center;gap:10px;color:#fff;}
  .brand .mark{
    width:36px;height:36px;border-radius:10px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-weight:900;color:var(--primary-dark);font-size:17px;flex:none;
  }
  .brand input{
    background:transparent;border:none;color:#fff;font-weight:800;font-size:18px;
    outline:none;border-bottom:2px solid transparent;padding:4px 2px;min-width:120px;width:180px;
  }
  .brand input:focus{border-bottom:2px solid var(--accent);}
  .search-wrap{flex:1;min-width:200px;position:relative;}
  .search-wrap input{
    width:100%;padding:11px 42px 11px 16px;border-radius:999px;border:none;
    font-size:15px;outline:none;background:rgba(255,255,255,0.95);color:var(--ink);
  }
  .search-wrap input:focus{box-shadow:0 0 0 3px rgba(217,164,65,0.5);}
  .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;font-size:15px;}
  .status{
    display:flex;align-items:center;gap:7px;color:#E9F1EC;font-size:13px;font-weight:600;flex:none;
    background:rgba(255,255,255,0.08);padding:7px 13px;border-radius:999px;
  }
  .status .dot{width:8px;height:8px;border-radius:50%;background:#6CD68B;animation:pulse 2s infinite;}
  .status.offline .dot{background:#D98D4A;animation:none;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(108,214,139,0.55);}
    70%{box-shadow:0 0 0 7px rgba(108,214,139,0);}
    100%{box-shadow:0 0 0 0 rgba(108,214,139,0);}
  }

  /* ---------- Layout ---------- */
  .layout{
    display:flex;align-items:flex-start;gap:20px;
    max-width:1180px;margin:22px auto;padding:0 18px 60px;
  }
  aside{
    width:260px;flex:none;background:var(--surface);border-radius:var(--radius);
    border:1px solid var(--border);padding:16px;position:sticky;top:88px;
  }
  aside h2{margin:2px 4px 14px;font-size:14px;color:var(--ink-soft);font-weight:700;letter-spacing:.3px;}
  .cat-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}

  .tag-chip{
    position:relative;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--bg);border:1.5px solid var(--border);border-radius:10px 4px 4px 10px;
    padding:11px 14px 11px 10px;cursor:pointer;transition:.15s ease;text-align:right;
  }
  .tag-chip::before{
    content:"";position:absolute;left:8px;top:50%;transform:translateY(-50%);
    width:7px;height:7px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);
  }
  .tag-chip:hover{border-color:var(--accent);}
  .tag-chip.active{background:var(--primary-soft);border-color:var(--primary);}
  .tag-chip.active::before{border-color:var(--primary);background:var(--primary-soft);}
  .tag-chip .name{font-weight:700;font-size:14.5px;color:var(--ink);}
  .tag-chip .count{font-size:11.5px;color:var(--ink-soft);background:#fff;border:1px solid var(--border);border-radius:999px;padding:2px 8px;flex:none;}
  .tag-chip.active .count{background:#fff;border-color:var(--primary);}

  .add-cat-btn{
    width:100%;margin-top:12px;padding:11px;border-radius:10px;border:1.5px dashed var(--primary);
    background:transparent;color:var(--primary);font-weight:700;font-size:14px;
  }
  .add-cat-btn:hover{background:var(--primary-soft);}

  main{flex:1;min-width:0;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .panel-head input.cat-title{
    flex:1;min-width:140px;font-family:'Tajawal',sans-serif;font-weight:800;font-size:20px;
    border:none;outline:none;background:transparent;color:var(--ink);border-bottom:2px solid transparent;padding:3px 2px;
  }
  .panel-head input.cat-title:focus{border-bottom:2px solid var(--accent);}
  .icon-btn{
    border:1px solid var(--border);background:#fff;border-radius:9px;width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink-soft);flex:none;
  }
  .icon-btn:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-soft);}

  table{width:100%;border-collapse:collapse;}
  thead th{
    text-align:right;font-size:12.5px;color:var(--ink-soft);font-weight:700;
    padding:11px 20px;background:var(--bg);border-bottom:1px solid var(--border);
  }
  thead th.col-actions{width:80px;text-align:center;}
  thead th.col-unit{width:130px;}
  thead th.col-price{width:150px;}
  tbody td{padding:9px 20px;border-bottom:1px solid var(--border);font-size:14.5px;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FCFAF5;}
  td input{
    width:100%;border:1px solid transparent;background:transparent;border-radius:7px;
    padding:7px 8px;font-size:14.5px;color:var(--ink);outline:none;
  }
  td input:hover{border-color:var(--border);background:#fff;}
  td input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(217,164,65,0.18);}
  td input.price-input{font-variant-numeric:tabular-nums;font-weight:700;color:var(--primary-dark);}

  .price-tag{
    display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);
    border:1px solid var(--accent);border-radius:8px 3px 3px 8px;padding:5px 10px 5px 8px;position:relative;
  }
  .price-tag::before{
    content:"";position:absolute;left:4px;top:50%;transform:translateY(-50%);
    width:5px;height:5px;border-radius:50%;background:var(--bg);border:1px solid var(--accent);
  }

  .row-actions{display:flex;gap:6px;justify-content:center;}
  .row-actions button{border:none;background:transparent;color:var(--ink-soft);width:30px;height:30px;border-radius:7px;font-size:14px;}
  .row-actions button:hover{background:var(--danger-soft);color:var(--danger);}

  .add-row-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--bg);flex-wrap:wrap;}
  .add-row-bar input{border:1px dashed var(--border);border-radius:8px;padding:10px;font-size:14px;outline:none;background:#fff;}
  .add-row-bar input:focus{border-color:var(--accent);}
  .add-row-bar input.f-name{flex:1;min-width:140px;}
  .add-row-bar input.f-unit{width:130px;}
  .add-row-bar input.f-price{width:120px;font-variant-numeric:tabular-nums;}
  .add-row-bar button{
    background:var(--primary);color:#fff;border:none;border-radius:8px;
    padding:10px 18px;font-weight:700;font-size:14px;flex:none;
  }
  .add-row-bar button:hover{background:var(--primary-dark);}

  .empty-state{padding:54px 24px;text-align:center;color:var(--ink-soft);}
  .empty-state .icon{font-size:32px;margin-bottom:10px;}
  .empty-state h3{margin:0 0 6px;color:var(--ink);font-size:17px;}
  .empty-state p{margin:0 0 18px;font-size:14px;}
  .empty-state button{background:var(--primary);color:#fff;border:none;padding:11px 22px;border-radius:9px;font-weight:700;font-size:14px;}

  .search-results .group-label{padding:11px 20px;font-size:12.5px;font-weight:700;color:var(--primary-dark);background:var(--primary-soft);border-bottom:1px solid var(--border);}

  /* ---------- Mobile: cards instead of table ---------- */
  @media (max-width:720px){
    header{padding:12px 14px;}
    .brand input{width:120px;font-size:16px;}
    .layout{flex-direction:column;padding:0 12px 50px;margin:16px auto;gap:14px;}
    aside{width:100%;position:static;padding:12px;}
    .cat-list{flex-direction:row;overflow-x:auto;padding-bottom:6px;gap:8px;}
    .tag-chip{flex:none;min-width:140px;}

    table, thead, tbody, tr{display:block;width:100%;}
    thead{display:none;}
    tbody{display:flex;flex-direction:column;gap:10px;padding:14px;}
    tr{
      border:1px solid var(--border);border-radius:12px;background:#fff;
      padding:6px 4px;
    }
    tbody td{
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--bg);padding:9px 12px;
    }
    tbody td:last-child{border-bottom:none;}
    tbody td::before{
      content:attr(data-label);font-size:11.5px;font-weight:700;color:var(--ink-soft);
      flex:none;margin-left:10px;
    }
    tbody td input{text-align:left;}
    .row-actions{justify-content:flex-end;}

    .panel-head{padding:14px 16px;}
    .add-row-bar{flex-direction:column;align-items:stretch;}
    .add-row-bar input, .add-row-bar button{width:100%;}

    .search-results table{padding:0 6px;}
    .search-results tbody{padding:10px;}
  }

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
</style>
</head>
<body>

<div id="setupScreen">
  <h2>وصّل الموقع بقاعدة البيانات</h2>
  <p>الصق كود إعدادات Firebase (firebaseConfig) اللي نسخته من Project settings في Firebase Console، وهيتم حفظه في المتصفح ده تلقائياً.</p>
  <textarea id="configInput" placeholder='{
  "apiKey": "...",
  "authDomain": "...",
  "projectId": "...",
  "storageBucket": "...",
  "messagingSenderId": "...",
  "appId": "..."
}'></textarea>
  <div id="setupError">الصيغة غير صحيحة، تأكد إنك لصقت كود الـ config كامل بصيغة JSON صحيحة.</div>
  <button id="saveConfigBtn">حفظ والمتابعة</button>
</div>

<div id="appRoot" style="display:none;">
  <header>
    <div class="brand">
      <div class="mark">س</div>
      <input id="storeName" class="display" value="قائمة أسعار المحل" />
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="ابحث عن صنف..." />
      <span class="search-icon">⌕</span>
    </div>
    <div class="status" id="statusBox"><span class="dot"></span><span id="statusText">جارٍ الاتصال...</span></div>
  </header>

  <div class="layout">
    <aside>
      <h2>الفئات</h2>
      <ul class="cat-list" id="catList"></ul>
      <button class="add-cat-btn" id="addCatBtn">+ فئة جديدة</button>
    </aside>
    <main id="mainPanel"></main>
  </div>
</div>

<script>
(function(){
  const CONFIG_KEY = 'storePriceList_firebaseConfig';
  const DOC_PATH = { collection: 'store', doc: 'catalog' };

  let data = { storeName: 'قائمة أسعار المحل', categories: [] };
  let selectedCatId = null;
  let searchTerm = '';
  let db, docRef, unsubscribe;
  let lastPushedJSON = '';

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function escapeHtml(s){
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------------- Setup screen handling ---------------- */
  function showSetup(){
    document.getElementById('setupScreen').style.display = 'block';
    document.getElementById('appRoot').style.display = 'none';
  }
  function showApp(){
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('appRoot').style.display = 'block';
  }

  document.getElementById('saveConfigBtn').addEventListener('click', () => {
    const raw = document.getElementById('configInput').value.trim();
    try{
      const cfg = JSON.parse(raw);
      if(!cfg.apiKey || !cfg.projectId) throw new Error('missing fields');
      localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
      document.getElementById('setupError').style.display = 'none';
      startApp(cfg);
    }catch(e){
      document.getElementById('setupError').style.display = 'block';
    }
  });

  /* ---------------- Firestore wiring ---------------- */
  function setStatus(text, online){
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusBox').classList.toggle('offline', online === false);
  }

  function isEditingNow(){
    const el = document.activeElement;
    return el && el.tagName === 'INPUT' && el.dataset.live === '1';
  }

  function startApp(cfg){
    showApp();
    try{
      firebase.initializeApp(cfg);
    }catch(e){ /* already initialized */ }
    db = firebase.firestore();
    docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);

    setStatus('جارٍ الاتصال...', true);

    unsubscribe = docRef.onSnapshot({ includeMetadataChanges: true }, snap => {
      if(snap.metadata.hasPendingWrites){
        return; // our own optimistic write echoing back, ignore
      }
      if(!snap.exists){
        // first run: seed the document
        docRef.set(data);
        return;
      }
      const remote = snap.data();
      const remoteJSON = JSON.stringify(remote);
      if(isEditingNow()){
        // don't disrupt active typing; the change will be picked up on next snapshot after blur
        return;
      }
      if(remoteJSON !== JSON.stringify(data)){
        data = remote;
        if(!data.categories.find(c => c.id === selectedCatId)){
          selectedCatId = data.categories[0] ? data.categories[0].id : null;
        }
        document.getElementById('storeName').value = data.storeName || 'قائمة أسعار المحل';
        render();
      }
      setStatus(snap.metadata.fromCache ? 'غير متصل بالإنترنت' : 'متصل الآن', !snap.metadata.fromCache);
    }, err => {
      console.error(err);
      setStatus('تعذر الاتصال بقاعدة البيانات', false);
    });
  }

  function pushData(){
    if(!docRef) return;
    lastPushedJSON = JSON.stringify(data);
    docRef.set(data).catch(err => {
      console.error(err);
      setStatus('تعذر الحفظ', false);
    });
  }

  function debounce(fn, ms){
    let t;
    return function(...args){ clearTimeout(t); t = setTimeout(() => fn.apply(this,args), ms); };
  }
  const debouncedPush = debounce(pushData, 450);

  /* ---------------- Mutations ---------------- */
  function addCategory(){
    const cat = { id: uid(), name: 'فئة جديدة', products: [] };
    data.categories.push(cat);
    selectedCatId = cat.id;
    searchTerm = '';
    document.getElementById('searchInput').value = '';
    pushData();
    render();
    setTimeout(() => {
      const inp = document.querySelector('.panel-head input.cat-title');
      if(inp){ inp.focus(); inp.select(); }
    }, 30);
  }

  function deleteCategory(id){
    const cat = data.categories.find(c => c.id === id);
    if(!cat) return;
    if(!confirm(`حذف فئة "${cat.name}" وكل منتجاتها؟`)) return;
    data.categories = data.categories.filter(c => c.id !== id);
    if(selectedCatId === id){ selectedCatId = data.categories[0] ? data.categories[0].id : null; }
    pushData();
    render();
  }

  function renameCategory(id, name){
    const cat = data.categories.find(c => c.id === id);
    if(!cat) return;
    cat.name = name;
    debouncedPush();
  }

  function addProduct(catId, name, unit, price){
    const cat = data.categories.find(c => c.id === catId);
    if(!cat || !name.trim()) return;
    cat.products.push({ id: uid(), name: name.trim(), unit: unit.trim(), price: price.trim() });
    pushData();
    render();
  }

  function updateProduct(catId, prodId, field, value){
    const cat = data.categories.find(c => c.id === catId);
    if(!cat) return;
    const p = cat.products.find(p => p.id === prodId);
    if(!p) return;
    p[field] = value;
    debouncedPush();
  }

  function deleteProduct(catId, prodId){
    const cat = data.categories.find(c => c.id === catId);
    if(!cat) return;
    cat.products = cat.products.filter(p => p.id !== prodId);
    pushData();
    render();
  }

  /* ---------------- Render ---------------- */
  function renderSidebar(){
    const list = document.getElementById('catList');
    if(data.categories.length === 0){
      list.innerHTML = '<li style="color:var(--ink-soft);font-size:13px;padding:8px 4px;">لا توجد فئات بعد</li>';
      return;
    }
    list.innerHTML = data.categories.map(cat => `
      <li class="tag-chip ${cat.id === selectedCatId && !searchTerm ? 'active' : ''}" data-cat="${cat.id}">
        <span class="name">${escapeHtml(cat.name)}</span>
        <span class="count">${cat.products.length}</span>
      </li>`).join('');
    list.querySelectorAll('.tag-chip').forEach(el => {
      el.addEventListener('click', () => {
        selectedCatId = el.dataset.cat;
        searchTerm = '';
        document.getElementById('searchInput').value = '';
        render();
      });
    });
  }

  function productRowHtml(p){
    return `
      <tr data-prod="${p.id}">
        <td data-label="الصنف"><input type="text" value="${escapeHtml(p.name)}" data-field="name" data-live="1" /></td>
        <td data-label="الوحدة"><input type="text" value="${escapeHtml(p.unit)}" data-field="unit" data-live="1" /></td>
        <td data-label="السعر">
          <div class="price-tag">
            <input class="price-input" type="text" inputmode="decimal" value="${escapeHtml(p.price)}" data-field="price" data-live="1" style="width:80px;" />
          </div>
        </td>
        <td data-label=""><div class="row-actions"><button class="del-prod" title="حذف الصنف">✕</button></div></td>
      </tr>`;
  }

  function renderMain(){
    const main = document.getElementById('mainPanel');

    if(searchTerm.trim()){
      const term = searchTerm.trim().toLowerCase();
      const matches = [];
      data.categories.forEach(cat => cat.products.forEach(p => {
        if(p.name.toLowerCase().includes(term)) matches.push({ cat, p });
      }));
      if(matches.length === 0){
        main.innerHTML = `<div class="panel"><div class="empty-state"><div class="icon">🔍</div><h3>لا توجد نتائج لـ "${escapeHtml(searchTerm)}"</h3><p>جرّب كلمة بحث مختلفة</p></div></div>`;
        return;
      }
      main.innerHTML = `
        <div class="panel search-results">
          <div class="panel-head"><h2 style="margin:0;font-size:17px;">نتائج البحث (${matches.length})</h2></div>
          <table>
            <thead><tr><th>الصنف</th><th class="col-unit">الوحدة</th><th class="col-price">سعر الوحدة</th><th class="col-actions"></th></tr></thead>
            <tbody>
              ${matches.map(m => `
                <tr data-cat="${m.cat.id}" data-prod="${m.p.id}">
                  <td data-label="الصنف">${escapeHtml(m.p.name)} <span style="color:var(--ink-soft);font-size:12px;">— ${escapeHtml(m.cat.name)}</span></td>
                  <td data-label="الوحدة" class="col-unit">${escapeHtml(m.p.unit)}</td>
                  <td data-label="السعر"><span class="price-tag">${escapeHtml(m.p.price)}</span></td>
                  <td data-label=""><div class="row-actions"><button class="del-search-prod" title="حذف">✕</button></div></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      main.querySelectorAll('.del-search-prod').forEach(btn => {
        btn.addEventListener('click', () => {
          const tr = btn.closest('tr');
          deleteProduct(tr.dataset.cat, tr.dataset.prod);
        });
      });
      return;
    }

    if(data.categories.length === 0){
      main.innerHTML = `
        <div class="panel"><div class="empty-state">
          <div class="icon">🏷️</div>
          <h3>ابدأ بإضافة أول فئة</h3>
          <p>الفئات تساعدك على تنظيم منتجات المحل، مثل "ألبان" أو "مشروبات"</p>
          <button id="emptyAddCat">+ إضافة فئة</button>
        </div></div>`;
      document.getElementById('emptyAddCat').addEventListener('click', addCategory);
      return;
    }

    const cat = data.categories.find(c => c.id === selectedCatId) || data.categories[0];
    selectedCatId = cat.id;

    main.innerHTML = `
      <div class="panel">
        <div class="panel-head">
          <input class="cat-title" id="catTitleInput" value="${escapeHtml(cat.name)}" data-live="1" />
          <button class="icon-btn" id="delCatBtn" title="حذف الفئة">🗑</button>
        </div>
        ${cat.products.length === 0 ? `
          <div class="empty-state"><div class="icon">📦</div><h3>لا توجد منتجات في هذه الفئة</h3><p>أضف أول صنف من الأسفل</p></div>` : `
        <table>
          <thead><tr><th>اسم الصنف</th><th class="col-unit">الوحدة</th><th class="col-price">سعر الوحدة</th><th class="col-actions"></th></tr></thead>
          <tbody id="prodTbody">${cat.products.map(p => productRowHtml(p)).join('')}</tbody>
        </table>`}
        <div class="add-row-bar">
          <input class="f-name" id="newProdName" placeholder="اسم الصنف" />
          <input class="f-unit" id="newProdUnit" placeholder="الوحدة (كيلو، علبة..)" />
          <input class="f-price" id="newProdPrice" placeholder="السعر" inputmode="decimal" />
          <button id="addProdBtn">+ إضافة</button>
        </div>
      </div>`;

    document.getElementById('delCatBtn').addEventListener('click', () => deleteCategory(cat.id));
    document.getElementById('catTitleInput').addEventListener('input', e => renameCategory(cat.id, e.target.value));

    const tbody = document.getElementById('prodTbody');
    if(tbody){
      tbody.querySelectorAll('tr').forEach(tr => {
        const prodId = tr.dataset.prod;
        tr.querySelectorAll('input[data-field]').forEach(inp => {
          inp.addEventListener('input', e => updateProduct(cat.id, prodId, inp.dataset.field, e.target.value));
        });
        tr.querySelector('.del-prod').addEventListener('click', () => deleteProduct(cat.id, prodId));
      });
    }

    const nameI = document.getElementById('newProdName');
    const unitI = document.getElementById('newProdUnit');
    const priceI = document.getElementById('newProdPrice');
    function submitNew(){ addProduct(cat.id, nameI.value, unitI.value, priceI.value); }
    document.getElementById('addProdBtn').addEventListener('click', submitNew);
    [nameI, unitI, priceI].forEach(inp => inp.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); submitNew(); } }));
  }

  function render(){ renderSidebar(); renderMain(); }

  /* ---------------- Global controls ---------------- */
  document.getElementById('addCatBtn').addEventListener('click', addCategory);
  document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; renderMain(); });
  document.getElementById('storeName').addEventListener('input', e => { data.storeName = e.target.value; debouncedPush(); });

  /* ---------------- Init ---------------- */
  (function init(){
    const saved = localStorage.getItem(CONFIG_KEY);
    if(saved){
      try{ startApp(JSON.parse(saved)); return; }catch(e){ /* fall through to setup */ }
    }
    showSetup();
  })();
})();
</script>

</body>
</html>
